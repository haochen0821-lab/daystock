{% extends "base.html" %}
{% block title %}管理{% endblock %}

{% block content %}
<style>
    .admin-stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 24px;
    }
    .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 16px;
    }
    .stat-card .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
    }
    .stat-card:nth-child(1) .stat-icon {
        background: rgba(0, 212, 255, 0.1);
        color: var(--primary);
    }
    .stat-card:nth-child(2) .stat-icon {
        background: rgba(0, 255, 136, 0.1);
        color: var(--secondary);
    }
    .stat-num {
        font-family: 'Syne', sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.2;
    }
    .stat-label {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
    }

    .search-bar {
        margin-bottom: 20px;
    }
    .search-bar input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 13px;
    }
    .search-bar input::placeholder {
        color: var(--muted);
    }
    .search-bar input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    .users-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
    }
    .users-card .card-header {
        padding: 16px 20px;
        margin-bottom: 0;
        border-bottom: 1px solid var(--border);
    }
    .users-card .card-header h3 {
        font-size: 16px;
        color: var(--text);
    }

    .users-table {
        width: 100%;
        border-collapse: collapse;
    }
    .users-table th {
        padding: 10px 16px;
        text-align: left;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 500;
        border-bottom: 1px solid var(--border);
        background: rgba(10, 15, 30, 0.4);
    }
    .users-table td {
        padding: 12px 16px;
        font-size: 13px;
        color: var(--text);
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
    }
    .users-table tr:last-child td {
        border-bottom: none;
    }
    .users-table tr:hover td {
        background: rgba(0, 212, 255, 0.03);
    }

    .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        line-height: 1.5;
    }
    .badge-member {
        background: rgba(100, 116, 139, 0.2);
        color: var(--muted);
        border: 1px solid rgba(100, 116, 139, 0.3);
    }
    .badge-admin {
        background: rgba(0, 212, 255, 0.12);
        color: var(--primary);
        border: 1px solid rgba(0, 212, 255, 0.3);
    }
    .badge-superadmin {
        background: rgba(255, 184, 0, 0.12);
        color: var(--warning);
        border: 1px solid rgba(255, 184, 0, 0.3);
    }
    .badge-active {
        background: rgba(0, 255, 136, 0.12);
        color: var(--secondary);
        border: 1px solid rgba(0, 255, 136, 0.3);
    }
    .badge-disabled {
        background: rgba(255, 74, 110, 0.12);
        color: var(--danger);
        border: 1px solid rgba(255, 74, 110, 0.3);
    }

    .actions-cell {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .role-select {
        padding: 5px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        cursor: pointer;
    }
    .role-select:focus {
        outline: none;
        border-color: var(--primary);
    }
    .role-select:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .btn-toggle {
        padding: 5px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: transparent;
    }
    .btn-toggle-disable {
        color: var(--danger);
        border-color: rgba(255, 74, 110, 0.3);
    }
    .btn-toggle-disable:hover {
        background: rgba(255, 74, 110, 0.1);
    }
    .btn-toggle-enable {
        color: var(--secondary);
        border-color: rgba(0, 255, 136, 0.3);
    }
    .btn-toggle-enable:hover {
        background: rgba(0, 255, 136, 0.1);
    }
    .btn-toggle:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }
    .btn-toggle:disabled:hover {
        background: transparent;
    }

    .btn-delete {
        padding: 5px 12px;
        border: 1px solid rgba(255, 74, 110, 0.3);
        border-radius: 6px;
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: transparent;
        color: var(--danger);
    }
    .btn-delete:hover {
        background: rgba(255, 74, 110, 0.15);
    }
    body.theme-light .btn-delete {
        border-color: rgba(229, 62, 62, 0.3);
    }
    body.theme-light .btn-delete:hover {
        background: rgba(229, 62, 62, 0.1);
    }

    .btn-create-user {
        padding: 8px 16px;
        background: var(--primary);
        color: var(--bg);
        border: none;
        border-radius: 8px;
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s ease;
        white-space: nowrap;
    }
    .btn-create-user:hover {
        opacity: 0.85;
    }
    .search-row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 20px;
    }
    .search-row .search-bar {
        flex: 1;
        margin-bottom: 0;
    }

    /* Create User Modal */
    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 9000;
        justify-content: center;
        align-items: center;
    }
    .modal-overlay.active {
        display: flex;
    }
    .modal-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
    }
    .modal-box h3 {
        margin: 0 0 20px 0;
        font-size: 18px;
        color: var(--text);
    }
    .modal-field {
        margin-bottom: 14px;
    }
    .modal-field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
    }
    .modal-field input,
    .modal-field select {
        width: 100%;
        padding: 10px 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        box-sizing: border-box;
    }
    .modal-field input:focus,
    .modal-field select:focus {
        outline: none;
        border-color: var(--primary);
    }
    .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
    }
    .modal-btn {
        padding: 8px 20px;
        border-radius: 8px;
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: all 0.2s ease;
    }
    .modal-btn-cancel {
        background: transparent;
        color: var(--muted);
    }
    .modal-btn-cancel:hover {
        background: var(--bg);
    }
    .modal-btn-submit {
        background: var(--primary);
        color: var(--bg);
        border-color: var(--primary);
    }
    .modal-btn-submit:hover {
        opacity: 0.85;
    }

    .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
        font-size: 13px;
    }

    .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 13px;
        font-family: 'DM Mono', monospace;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        transition: opacity 0.3s ease;
    }
    .toast-success {
        background: var(--surface);
        border: 1px solid rgba(0, 255, 136, 0.3);
        color: var(--secondary);
    }
    .toast-error {
        background: var(--surface);
        border: 1px solid rgba(255, 74, 110, 0.3);
        color: var(--danger);
    }

    /* ===== Light theme overrides ===== */
    body.theme-light .stat-card:nth-child(1) .stat-icon {
        background: rgba(0, 119, 204, 0.1);
    }
    body.theme-light .stat-card:nth-child(2) .stat-icon {
        background: rgba(0, 168, 84, 0.1);
    }
    body.theme-light .search-bar input:focus {
        box-shadow: 0 0 0 3px rgba(0, 119, 204, 0.1);
    }
    body.theme-light .users-table th {
        background: rgba(0, 0, 0, 0.03);
    }
    body.theme-light .users-table tr:hover td {
        background: rgba(0, 119, 204, 0.03);
    }
    body.theme-light .badge-admin {
        background: rgba(0, 119, 204, 0.1);
        border-color: rgba(0, 119, 204, 0.3);
    }
    body.theme-light .badge-superadmin {
        background: rgba(214, 158, 46, 0.1);
        border-color: rgba(214, 158, 46, 0.3);
    }
    body.theme-light .badge-active {
        background: rgba(0, 168, 84, 0.1);
        border-color: rgba(0, 168, 84, 0.3);
    }
    body.theme-light .badge-disabled {
        background: rgba(229, 62, 62, 0.1);
        border-color: rgba(229, 62, 62, 0.3);
    }
    body.theme-light .btn-toggle-disable {
        border-color: rgba(229, 62, 62, 0.3);
    }
    body.theme-light .btn-toggle-disable:hover {
        background: rgba(229, 62, 62, 0.1);
    }
    body.theme-light .btn-toggle-enable {
        border-color: rgba(0, 168, 84, 0.3);
    }
    body.theme-light .btn-toggle-enable:hover {
        background: rgba(0, 168, 84, 0.1);
    }
    body.theme-light .toast-success {
        border-color: rgba(0, 168, 84, 0.3);
    }
    body.theme-light .toast-error {
        border-color: rgba(229, 62, 62, 0.3);
    }

    @media (max-width: 768px) {
        .admin-stats {
            grid-template-columns: 1fr;
        }
        .users-table-wrap {
            overflow-x: auto;
        }
        .users-table {
            min-width: 700px;
        }
    }
</style>

<!-- Stats Cards -->
<div class="admin-stats">
    <div class="stat-card">
        <div class="stat-icon">&#x25A3;</div>
        <div>
            <div class="stat-num" id="stat-total">--</div>
            <div class="stat-label" data-i18n="admin.total_users">總用戶數</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">&#x2714;</div>
        <div>
            <div class="stat-num" id="stat-active">--</div>
            <div class="stat-label" data-i18n="admin.active_users">啟用中用戶</div>
        </div>
    </div>
</div>

<!-- Search Bar + Create Button -->
<div class="search-row">
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜尋帳號或信箱..." data-i18n-placeholder="admin.search_placeholder" oninput="filterUsers()">
    </div>
    <button class="btn-create-user" onclick="openCreateUser()" data-i18n="admin.create_user">&#x2795; 新增用戶</button>
</div>

<!-- Create User Modal -->
<div class="modal-overlay" id="createUserModal">
    <div class="modal-box">
        <h3 data-i18n="admin.create_user_title">新增用戶</h3>
        <div class="modal-field">
            <label data-i18n="admin.field_username">帳號</label>
            <input type="text" id="newUsername" autocomplete="off">
        </div>
        <div class="modal-field">
            <label data-i18n="admin.field_email">信箱</label>
            <input type="email" id="newEmail" autocomplete="off">
        </div>
        <div class="modal-field">
            <label data-i18n="admin.field_password">密碼（至少 8 字元）</label>
            <input type="password" id="newPassword" autocomplete="new-password">
        </div>
        <div class="modal-field">
            <label data-i18n="admin.field_role">角色</label>
            <select id="newRole">
                <option value="member">member</option>
                <option value="admin">admin</option>
                <option value="superadmin">superadmin</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeCreateUser()" data-i18n="admin.cancel">取消</button>
            <button class="modal-btn modal-btn-submit" onclick="submitCreateUser()" data-i18n="admin.create">建立</button>
        </div>
    </div>
</div>

<!-- Users Table -->
<div class="users-card">
    <div class="card-header">
        <h3 data-i18n="admin.user_mgmt">用戶管理</h3>
    </div>
    <div class="users-table-wrap">
        <table class="users-table">
            <thead>
                <tr>
                    <th data-i18n="admin.th_id">ID</th>
                    <th data-i18n="admin.th_username">帳號</th>
                    <th data-i18n="admin.th_email">信箱</th>
                    <th data-i18n="admin.th_role">角色</th>
                    <th data-i18n="admin.th_status">狀態</th>
                    <th data-i18n="admin.th_created">建立日期</th>
                    <th data-i18n="admin.th_actions">操作</th>
                </tr>
            </thead>
            <tbody id="usersBody">
                <tr><td colspan="7" class="empty-state" data-i18n="admin.loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const CURRENT_USER_ROLE = '{{ current_user.role }}';
const CURRENT_USER_ID = {{ current_user.id }};
let allUsers = [];

function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toast(msg, type) {
    type = type || 'success';
    var el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() {
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 300);
    }, 2500);
}

async function apiCall(url, method, body) {
    method = method || 'GET';
    var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    var res = await fetch(url, opts);
    return res.json();
}

function roleBadgeClass(role) {
    if (role === 'superadmin') return 'badge-superadmin';
    if (role === 'admin') return 'badge-admin';
    return 'badge-member';
}

function renderUsers(users) {
    var tbody = document.getElementById('usersBody');
    if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state" data-i18n="admin.no_users">查無用戶。</td></tr>';
        return;
    }

    var html = '';
    for (var i = 0; i < users.length; i++) {
        var u = users[i];
        var isSelf = u.id === CURRENT_USER_ID;
        var isActive = u.is_active !== false && u.status !== 'disabled';
        var statusLabel = isActive ? '啟用' : '停用';
        var statusClass = isActive ? 'badge-active' : 'badge-disabled';
        var role = u.role || 'member';
        var created = u.created_at ? u.created_at.slice(0, 10) : '--';

        var actionsHtml = '<div class="actions-cell">';

        // Role change dropdown - only for superadmin
        if (CURRENT_USER_ROLE === 'superadmin') {
            var disabled = isSelf ? ' disabled' : '';
            actionsHtml += '<select class="role-select" onchange="changeRole(' + u.id + ', this.value)"' + disabled + '>';
            var roles = ['member', 'admin', 'superadmin'];
            for (var r = 0; r < roles.length; r++) {
                var sel = roles[r] === role ? ' selected' : '';
                actionsHtml += '<option value="' + roles[r] + '"' + sel + '>' + roles[r] + '</option>';
            }
            actionsHtml += '</select>';
        }

        // Toggle button
        var toggleDisabled = isSelf ? ' disabled' : '';
        if (isActive) {
            actionsHtml += '<button class="btn-toggle btn-toggle-disable" data-i18n="admin.disable" onclick="toggleUser(' + u.id + ')"' + toggleDisabled + '>停用</button>';
        } else {
            actionsHtml += '<button class="btn-toggle btn-toggle-enable" data-i18n="admin.enable" onclick="toggleUser(' + u.id + ')"' + toggleDisabled + '>啟用</button>';
        }

        // Delete button - superadmin only, not self
        if (CURRENT_USER_ROLE === 'superadmin' && !isSelf) {
            actionsHtml += '<button class="btn-delete" data-i18n="admin.delete" onclick="deleteUser(' + u.id + ', \'' + escHtml(u.username).replace(/'/g, "\\'") + '\')">刪除</button>';
        }

        actionsHtml += '</div>';

        html += '<tr>' +
            '<td>' + u.id + '</td>' +
            '<td>' + escHtml(u.username) + '</td>' +
            '<td>' + escHtml(u.email) + '</td>' +
            '<td><span class="badge ' + roleBadgeClass(role) + '">' + escHtml(role) + '</span></td>' +
            '<td><span class="badge ' + statusClass + '">' + statusLabel + '</span></td>' +
            '<td>' + created + '</td>' +
            '<td>' + actionsHtml + '</td>' +
            '</tr>';
    }
    tbody.innerHTML = html;
}

function updateStats(users) {
    document.getElementById('stat-total').textContent = users.length;
    var active = 0;
    for (var i = 0; i < users.length; i++) {
        if (users[i].is_active !== false && users[i].status !== 'disabled') active++;
    }
    document.getElementById('stat-active').textContent = active;
}

function filterUsers() {
    var q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!q) {
        renderUsers(allUsers);
        return;
    }
    var filtered = allUsers.filter(function(u) {
        return (u.username && u.username.toLowerCase().indexOf(q) !== -1) ||
               (u.email && u.email.toLowerCase().indexOf(q) !== -1);
    });
    renderUsers(filtered);
}

async function loadUsers() {
    try {
        var data = await apiCall('/api/admin/users');
        allUsers = Array.isArray(data) ? data : (data.users || []);
        updateStats(allUsers);
        filterUsers();
    } catch (e) {
        document.getElementById('usersBody').innerHTML =
            '<tr><td colspan="7" class="empty-state">載入用戶失敗。</td></tr>';
    }
}

async function changeRole(userId, newRole) {
    try {
        var data = await apiCall('/api/admin/users/' + userId + '/role', 'PUT', { role: newRole });
        if (data.error) { toast(data.error, 'error'); loadUsers(); return; }
        toast('角色已更新');
        loadUsers();
    } catch (e) {
        toast('更新角色失敗', 'error');
        loadUsers();
    }
}

async function toggleUser(userId) {
    try {
        var data = await apiCall('/api/admin/users/' + userId + '/toggle', 'POST');
        if (data.error) { toast(data.error, 'error'); return; }
        toast('狀態已更新');
        loadUsers();
    } catch (e) {
        toast('切換狀態失敗', 'error');
    }
}

function openCreateUser() {
    document.getElementById('newUsername').value = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newRole').value = 'member';
    document.getElementById('createUserModal').classList.add('active');
}

function closeCreateUser() {
    document.getElementById('createUserModal').classList.remove('active');
}

async function submitCreateUser() {
    var username = document.getElementById('newUsername').value.trim();
    var email = document.getElementById('newEmail').value.trim();
    var password = document.getElementById('newPassword').value;
    var role = document.getElementById('newRole').value;

    if (!username || !email || password.length < 8) {
        toast('請填寫帳號、信箱，密碼至少 8 字元', 'error');
        return;
    }

    try {
        var data = await apiCall('/api/admin/users', 'POST', {
            username: username,
            email: email,
            password: password,
            role: role
        });
        if (data.error) {
            toast(data.error, 'error');
            return;
        }
        toast(data.message || '用戶建立成功');
        closeCreateUser();
        loadUsers();
    } catch (e) {
        toast('建立用戶失敗', 'error');
    }
}

async function deleteUser(userId, username) {
    if (!confirm('確定要刪除用戶「' + username + '」？此操作無法復原。')) {
        return;
    }
    try {
        var data = await apiCall('/api/admin/users/' + userId, 'DELETE');
        if (data.error) {
            toast(data.error, 'error');
            return;
        }
        toast(data.message || '用戶已刪除');
        loadUsers();
    } catch (e) {
        toast('刪除用戶失敗', 'error');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    loadUsers();
});
</script>
{% endblock %}
