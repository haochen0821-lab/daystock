{% extends "base.html" %}
{% block title %}模擬{% endblock %}

{% block content %}
<style>
    /* ===== Tabs ===== */
    .sim-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
    .sim-tab {
        padding: 10px 18px;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--muted);
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
    }
    .sim-tab:hover {
        color: var(--text);
        background: rgba(0, 212, 255, 0.04);
    }
    .sim-tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
    }

    /* ===== Strategy Panels ===== */
    .strategy-panel {
        display: none;
    }
    .strategy-panel.active {
        display: block;
    }
    .sim-form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin-bottom: 18px;
    }

    /* ===== Custom Trades Table ===== */
    .trades-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 12px;
    }
    .trades-table th {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid var(--border);
    }
    .trades-table td {
        padding: 6px 10px;
        border-bottom: 1px solid rgba(30, 45, 74, 0.5);
    }
    .trades-table input,
    .trades-table select {
        width: 100%;
        padding: 7px 10px;
        font-size: 12px;
    }
    .trade-remove-btn {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 16px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background 0.2s;
    }
    .trade-remove-btn:hover {
        background: rgba(255, 74, 110, 0.12);
    }

    /* ===== Run Button ===== */
    .sim-run-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 6px;
    }
    .sim-run-row .btn {
        min-width: 140px;
    }
    .sim-spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 2px solid var(--border);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* ===== Result Section ===== */
    #result-section {
        display: none;
        margin-top: 28px;
    }

    /* ===== Metric Cards ===== */
    .metric-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin-bottom: 22px;
    }
    .metric-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        text-align: center;
    }
    .metric-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 6px;
    }
    .metric-value {
        font-family: 'Syne', sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
    }
    .metric-value.positive { color: var(--secondary); }
    .metric-value.negative { color: var(--danger); }

    /* ===== Chart Container ===== */
    .chart-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        position: relative;
    }
    .chart-wrap canvas {
        width: 100% !important;
        max-height: 420px;
    }
    .chart-legend-custom {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 12px;
    }
    .chart-legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
    }
    .chart-legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    /* ===== DRIP diff badge ===== */
    .drip-diff {
        display: inline-block;
        margin-top: 10px;
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        background: rgba(0, 212, 255, 0.1);
        border: 1px solid rgba(0, 212, 255, 0.25);
        color: var(--primary);
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
        .sim-form-grid {
            grid-template-columns: 1fr 1fr;
        }
        .metric-cards {
            grid-template-columns: repeat(2, 1fr);
        }
        .sim-tabs {
            gap: 0;
        }
        .sim-tab {
            padding: 8px 12px;
            font-size: 12px;
        }
    }
    @media (max-width: 480px) {
        .sim-form-grid {
            grid-template-columns: 1fr;
        }
        .metric-cards {
            grid-template-columns: 1fr 1fr;
        }
    }
</style>

<h2 style="margin-bottom:18px; font-size:20px;" data-i18n="sim.title">模擬</h2>

<!-- Strategy Tabs -->
<div class="sim-tabs" role="tablist">
    <button class="sim-tab active" data-tab="fixed_shares" onclick="switchStrategy(this)" role="tab" data-i18n="sim.tab_fixed_shares">固定股數</button>
    <button class="sim-tab" data-tab="fixed_amount" onclick="switchStrategy(this)" role="tab" data-i18n="sim.tab_fixed_amount">固定金額</button>
    <button class="sim-tab" data-tab="dca" onclick="switchStrategy(this)" role="tab" data-i18n="sim.tab_dca">定期定額</button>
    <button class="sim-tab" data-tab="custom" onclick="switchStrategy(this)" role="tab" data-i18n="sim.tab_custom">自訂</button>
    <button class="sim-tab" data-tab="dca_drip" onclick="switchStrategy(this)" role="tab" data-i18n="sim.tab_drip">股利再投資</button>
</div>

<!-- =============== Tab 1: Fixed Shares =============== -->

        <div class="card-header"><h3 data-i18n="sim.tab_fixed_shares">固定股數</h3></div>
        <div class="sim-form-grid">
            <div class="form-group">
                <label data-i18n="sim.symbol">代號</label>
                <input type="text" id="fs-symbol" placeholder="AAPL, 2330..." style="text-transform:uppercase;">
            </div>
            <div class="form-group">
                <label data-i18n="sim.market">市場</label>
                <select id="fs-market">
                    <option value="US">US</option>
                    <option value="TW">TW</option>
                </select>
            </div>
            <div class="form-group">
                <label data-i18n="sim.shares">股數</label>
                <input type="number" id="fs-shares" min="1" value="100">
            </div>
            <div class="form-group">
                <label data-i18n="sim.start_date">開始日期</label>
                <input type="date" id="fs-start">
            </div>
            <div class="form-group">
                <label data-i18n="sim.end_date">結束日期</label>
                <input type="date" id="fs-end">
            </div>
        </div>
        <div class="sim-run-row">
            <button class="btn btn-primary" onclick="runSimulation('fixed_shares')" data-i18n="sim.run">執行模擬</button>
            <div class="sim-spinner" id="spinner-fixed_shares"></div>
        </div>
    </div>
</div>

<!-- =============== Tab 2: Fixed Amount =============== -->

<!-- =============== Tab 4: Custom =============== -->

            <div class="form-group">

{% block extra_js %}
<script>
(function() {
    /* ---------- Default dates ---------- */
    var today = new Date();
    var oneYearAgo = new Date(today);
    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
    var todayStr = today.toISOString().slice(0, 10);
    var yearAgoStr = oneYearAgo.toISOString().slice(0, 10);

    ['fs-start','fa-start','dca-start','ct-start','drip-start'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el && !el.value) el.value = yearAgoStr;
    });
    ['fs-end','fa-end','dca-end','ct-end','drip-end'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el && !el.value) el.value = todayStr;
    });

    /* ---------- Tab switching ---------- */
    window.switchStrategy = function(btn) {
        document.querySelectorAll('.sim-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.strategy-panel').forEach(function(p) { p.classList.remove('active'); });
        btn.classList.add('active');
        var panelId = 'panel-' + btn.getAttribute('data-tab');
        document.getElementById(panelId).classList.add('active');
    };

    /* ---------- Custom trade rows ---------- */
    window.addTradeRow = function() {
        var tbody = document.getElementById('custom-trades-body');
        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td><input type="date" class="ct-date"></td>' +
            '<td><select class="ct-type"><option value="buy">買入</option><option value="sell">賣出</option></select></td>' +
            '<td><input type="number" class="ct-shares" min="1" value="100"></td>' +
            '<td><button class="trade-remove-btn" onclick="removeTradeRow(this)" title="移除">&times;</button></td>';
        tbody.appendChild(tr);
    };

    window.removeTradeRow = function(btn) {
        var tbody = document.getElementById('custom-trades-body');
        if (tbody.rows.length > 1) {
            btn.closest('tr').remove();
        }
    };

    /* ---------- Collect form data ---------- */
    function getPayload(strategy) {
        var p = {};
        if (strategy === 'fixed_shares') {
            p = {
                strategy: 'fixed_shares',
                symbol: document.getElementById('fs-symbol').value.trim().toUpperCase(),
                market: document.getElementById('fs-market').value,
                shares: parseInt(document.getElementById('fs-shares').value) || 100,
                start_date: document.getElementById('fs-start').value,
                end_date: document.getElementById('fs-end').value
            };
        } else if (strategy === 'fixed_amount') {
            p = {
                strategy: 'fixed_amount',
                symbol: document.getElementById('fa-symbol').value.trim().toUpperCase(),
                market: document.getElementById('fa-market').value,
                amount: parseFloat(document.getElementById('fa-amount').value) || 10000,
                frequency: parseInt(document.getElementById('fa-frequency').value) || 1,
                start_date: document.getElementById('fa-start').value,
                end_date: document.getElementById('fa-end').value
            };
        } else if (strategy === 'dca') {
            p = {
                strategy: 'dca',
                symbol: document.getElementById('dca-symbol').value.trim().toUpperCase(),
                market: document.getElementById('dca-market').value,
                amount: parseFloat(document.getElementById('dca-amount').value) || 10000,
                frequency: parseInt(document.getElementById('dca-frequency').value) || 30,
                start_date: document.getElementById('dca-start').value,
                end_date: document.getElementById('dca-end').value
            };
        } else if (strategy === 'custom') {
            var trades = [];
            var rows = document.getElementById('custom-trades-body').querySelectorAll('tr');
            rows.forEach(function(row) {
                var d = row.querySelector('.ct-date').value;
                var t = row.querySelector('.ct-type').value;
                var s = parseInt(row.querySelector('.ct-shares').value) || 0;
                if (d && s > 0) trades.push({ date: d, type: t, shares: s });
            });
            p = {
                strategy: 'custom',
                symbol: document.getElementById('ct-symbol').value.trim().toUpperCase(),
                market: document.getElementById('ct-market').value,
                start_date: document.getElementById('ct-start').value,
                end_date: document.getElementById('ct-end').value,
                trades: trades
            };
        }
        return p;
    }

    function getDRIPPayload() {
        return {
            symbol: document.getElementById('drip-symbol').value.trim().toUpperCase(),
            market: document.getElementById('drip-market').value,
            amount: parseFloat(document.getElementById('drip-amount').value) || 10000,
            frequency: parseInt(document.getElementById('drip-frequency').value) || 30,
            start_date: document.getElementById('drip-start').value,
            end_date: document.getElementById('drip-end').value
        };
    }

    /* ---------- Spinner helpers ---------- */
    function showSpinner(strategy) {
        var el = document.getElementById('spinner-' + strategy);
        if (el) el.style.display = 'block';
    }
    function hideSpinner(strategy) {
        var el = document.getElementById('spinner-' + strategy);
        if (el) el.style.display = 'none';
    }

    /* ---------- Chart instance ---------- */
    var chartInstance = null;

    /* ---------- Format helpers ---------- */
    function fmtPct(v) {
        if (v == null) return '--';
        var n = parseFloat(v);
        return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }
    function fmtMoney(v) {
        if (v == null) return '--';
        var n = parseFloat(v);
        var prefix = n >= 0 ? '+' : '';
        return prefix + n.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }
    function pctClass(v) {
        if (v == null) return '';
        return parseFloat(v) >= 0 ? 'positive' : 'negative';
    }

    /* ---------- Render metrics ---------- */
    function renderMetrics(data) {
        var m = data.metrics || data;

        var gross = document.getElementById('m-gross');
        gross.textContent = fmtPct(m.gross_return_pct);
        gross.className = 'metric-value ' + pctClass(m.gross_return_pct);

        var net = document.getElementById('m-net');
        net.textContent = fmtPct(m.net_return_pct);
        net.className = 'metric-value ' + pctClass(m.net_return_pct);

        var cagr = document.getElementById('m-cagr');
        cagr.textContent = fmtPct(m.cagr);
        cagr.className = 'metric-value ' + pctClass(m.cagr);

        var mdd = document.getElementById('m-mdd');
        mdd.textContent = m.max_drawdown != null ? parseFloat(m.max_drawdown).toFixed(2) + '%' : '--';
        mdd.className = 'metric-value negative';

        var bench = document.getElementById('m-bench');
        bench.textContent = fmtPct(m.vs_benchmark);
        bench.className = 'metric-value ' + pctClass(m.vs_benchmark);

        var pnl = document.getElementById('m-pnl');
        pnl.textContent = fmtMoney(m.net_pnl);
        pnl.className = 'metric-value ' + pctClass(m.net_pnl);
    }

    /* ---------- Render standard chart ---------- */
    function renderChart(data) {
        var labels = data.dates || [];
        var datasets = [];

        /* Market value line */
        if (data.market_values) {
            datasets.push({
                label: '市值',
                data: data.market_values,
                borderColor: 'var(--primary)',
                backgroundColor: 'rgba(0, 212, 255, 0.06)',
                borderWidth: 2,
                pointRadius: 0,
                pointHitRadius: 8,
                fill: true,
                tension: 0.3
            });
        }

        /* Cost line */
        if (data.costs) {
            datasets.push({
                label: '成本',
                data: data.costs,
                borderColor: 'var(--warning)',
                borderWidth: 1.5,
                borderDash: [6, 4],
                pointRadius: 0,
                pointHitRadius: 8,
                fill: false,
                tension: 0.1
            });
        }

        /* Benchmark line */
        if (data.benchmark_values) {
            datasets.push({
                label: '基準',
                data: data.benchmark_values,
                borderColor: 'var(--muted)',
                borderWidth: 1.5,
                pointRadius: 0,
                pointHitRadius: 8,
                fill: false,
                tension: 0.3
            });
        }

        buildChart(labels, datasets);
    }

    /* ---------- Render DRIP chart ---------- */
    function renderDRIPChart(data) {
        var labels = data.dates || [];
        var datasets = [];

        /* DCA line (blue) */
        if (data.dca_values) {
            datasets.push({
                label: '定期定額',
                data: data.dca_values,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.05)',
                borderWidth: 2,
                pointRadius: 0,
                pointHitRadius: 8,
                fill: false,
                tension: 0.3
            });
        }

        /* DRIP line (cyan) */
        if (data.drip_values) {
            datasets.push({
                label: '定期定額 + DRIP',
                data: data.drip_values,
                borderColor: 'var(--primary)',
                backgroundColor: 'rgba(0, 212, 255, 0.08)',
                borderWidth: 2,
                pointRadius: 0,
                pointHitRadius: 8,
                fill: true,
                tension: 0.3
            });
        }

        /* Cost line (dashed) */
        if (data.costs) {
            datasets.push({
                label: '成本',
                data: data.costs,
                borderColor: 'var(--warning)',
                borderWidth: 1.5,
                borderDash: [6, 4],
                pointRadius: 0,
                pointHitRadius: 8,
                fill: false,
                tension: 0.1
            });
        }

        buildChart(labels, datasets);

        /* Show DRIP compound diff */
        var diffWrap = document.getElementById('drip-diff-wrap');
        var diffBadge = document.getElementById('drip-diff-badge');
        if (data.compound_diff != null) {
            diffBadge.textContent = 'DRIP 複利優勢: ' + fmtMoney(data.compound_diff);
            diffWrap.style.display = 'block';
        } else {
            diffWrap.style.display = 'none';
        }
    }

    /* ---------- Build Chart.js ---------- */
    function buildChart(labels, datasets) {
        if (chartInstance) {
            chartInstance.destroy();
            chartInstance = null;
        }

        /* Custom legend */
        var legendEl = document.getElementById('chart-legend');
        legendEl.innerHTML = '';
        datasets.forEach(function(ds) {
            var item = document.createElement('div');
            item.className = 'chart-legend-item';
            var dot = document.createElement('span');
            dot.className = 'chart-legend-dot';
            dot.style.background = ds.borderColor;
            if (ds.borderDash) {
                dot.style.border = '2px dashed ' + ds.borderColor;
                dot.style.background = 'transparent';
            }
            var text = document.createElement('span');
            text.textContent = ds.label;
            item.appendChild(dot);
            item.appendChild(text);
            legendEl.appendChild(item);
        });

        var ctx = document.getElementById('equityChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(15, 22, 41, 0.95)',
                        borderColor: 'var(--border)',
                        borderWidth: 1,
                        titleFont: { family: 'DM Mono', size: 12 },
                        bodyFont: { family: 'DM Mono', size: 12 },
                        padding: 12,
                        callbacks: {
                            label: function(ctx) {
                                var val = ctx.parsed.y;
                                return ctx.dataset.label + ': ' + (val != null ? val.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 }) : '--');
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: 'var(--muted)',
                            font: { family: 'DM Mono', size: 11 },
                            maxTicksLimit: 10
                        },
                        grid: { color: 'rgba(30, 45, 74, 0.4)' }
                    },
                    y: {
                        ticks: {
                            color: 'var(--muted)',
                            font: { family: 'DM Mono', size: 11 },
                            callback: function(v) { return v.toLocaleString(); }
                        },
                        grid: { color: 'rgba(30, 45, 74, 0.4)' }
                    }
                }
            }
        });
    }

    /* ---------- Run standard simulation ---------- */
    window.runSimulation = function(strategy) {
        var payload = getPayload(strategy);
        if (!payload.symbol) { alert('請輸入股票代號'); return; }

        showSpinner(strategy);
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('drip-diff-wrap').style.display = 'none';

        fetch('/api/simulate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            hideSpinner(strategy);
            if (data.error) { alert('錯誤: ' + data.error); return; }
            renderMetrics(data);
            renderChart(data);
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        })
        .catch(function(err) {
            hideSpinner(strategy);
            alert('請求失敗: ' + err.message);
        });
    };

    /* ---------- Run DRIP simulation ---------- */
    window.runDRIP = function() {
        var payload = getDRIPPayload();
        if (!payload.symbol) { alert('請輸入股票代號'); return; }

        showSpinner('dca_drip');
        document.getElementById('result-section').style.display = 'none';

        fetch('/api/simulate/dca_drip', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            hideSpinner('dca_drip');
            if (data.error) { alert('錯誤: ' + data.error); return; }
            renderMetrics(data);
            renderDRIPChart(data);
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        })
        .catch(function(err) {
            hideSpinner('dca_drip');
            alert('請求失敗: ' + err.message);
        });
    };
})();
</script>
{% endblock %}
