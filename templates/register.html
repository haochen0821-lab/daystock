<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daystock - Register</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0f1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daystock">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #0f1629;
            --border: #1e2d4a;
            --text: #e8eef7;
            --muted: #4a5a7a;
            --primary: #00d4ff;
            --secondary: #00ff88;
            --danger: #ff4a6e;
            --warning: #ffb800;
            --input-bg: rgba(10,15,30,0.6);
            --placeholder: #2a3a5a;
        }
        body.theme-light {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1a202c;
            --muted: #718096;
            --primary: #0077cc;
            --secondary: #00a854;
            --danger: #e53e3e;
            --warning: #d69e2e;
            --input-bg: #f7fafc;
            --placeholder: #a0aec0;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(color-mix(in srgb, var(--border) 25%, transparent) 1px, transparent 1px),
                linear-gradient(90deg, color-mix(in srgb, var(--border) 25%, transparent) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        .card {
            position: relative; z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 80px rgba(0,255,136,0.05), 0 4px 32px rgba(0,0,0,0.4);
            margin: 32px 0;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 68px; height: 68px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(0,255,136,0.12), rgba(0,212,255,0.08));
            border: 1px solid rgba(0,255,136,0.2);
            margin-bottom: 16px;
        }

        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 26px;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
            font-family: 'DM Mono', monospace;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-family: 'DM Mono', monospace;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            font-family: 'DM Mono', monospace;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.12), 0 0 20px rgba(0,255,136,0.08);
        }

        .form-group input::placeholder {
            color: var(--placeholder);
        }

        .form-group input.input-error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(255,74,110,0.12);
        }

        .field-hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
            font-family: 'DM Mono', monospace;
        }

        .field-hint.hint-error {
            color: var(--danger);
        }

        .field-hint.hint-ok {
            color: var(--secondary);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #0a0f1e;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.3s;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 24px rgba(0,255,136,0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(255,74,110,0.1);
            border: 1px solid rgba(255,74,110,0.25);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            font-family: 'DM Mono', monospace;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .success-msg {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.25);
            color: var(--secondary);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            font-family: 'DM Mono', monospace;
            display: none;
        }

        .success-msg.show {
            display: block;
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-link a:hover {
            color: var(--secondary);
        }

        .pw-strength {
            height: 3px;
            border-radius: 2px;
            background: var(--border);
            margin-top: 8px;
            overflow: hidden;
        }

        .pw-strength-bar {
            height: 100%;
            width: 0;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
        }

        @media (max-width: 480px) {
            .card { margin: 16px; padding: 36px 24px 28px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">&#x1F4DD;</div>
            <h1 data-i18n="reg.title">建立帳號</h1>
            <p data-i18n="reg.subtitle">加入 Daystock</p>
        </div>

        <div style="display:flex;justify-content:center;gap:8px;margin-bottom:20px;">
            <button id="langToggle" onclick="toggleLang()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;">EN</button>
            <button id="themeToggle" onclick="toggleTheme()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:16px;cursor:pointer;line-height:1;">☾</button>
        </div>

        <div class="error-msg" id="errorMsg">
            {% if error %}{{ error }}{% endif %}
        </div>
        <div class="success-msg" id="successMsg"></div>

        <form id="registerForm" autocomplete="on" novalidate>
            <div class="form-group">
                <label data-i18n="login.username">帳號</label>
                <input type="text" name="username" id="username" placeholder="選擇帳號名稱" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label data-i18n="reg.email">電子郵件</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label data-i18n="login.password">密碼</label>
                <input type="password" name="password" id="password" placeholder="至少 8 個字元" required autocomplete="new-password">
                <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
                <div class="field-hint" id="pwHint">至少 8 個字元</div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn" data-i18n="reg.create_btn">建立帳號</button>
        </form>

        <p class="footer-link"><span data-i18n="reg.has_account">已有帳號？</span> <a href="/login" data-i18n="reg.sign_in">登入</a></p>
    </div>

    <script>
        // Show error if server-rendered
        (function() {
            const el = document.getElementById('errorMsg');
            if (el.textContent.trim()) el.classList.add('show');
        })();

        // Password strength / validation
        const pwInput = document.getElementById('password');
        const pwBar = document.getElementById('pwBar');
        const pwHint = document.getElementById('pwHint');

        pwInput.addEventListener('input', function() {
            const len = this.value.length;
            pwInput.classList.remove('input-error');
            pwHint.classList.remove('hint-error', 'hint-ok');

            const isEn = localStorage.getItem('ds-lang')==='en';
            if (len === 0) {
                pwBar.style.width = '0';
                pwHint.textContent = isEn ? 'Minimum 8 characters' : '至少 8 個字元';
                return;
            }

            if (len < 8) {
                const pct = (len / 8) * 50;
                pwBar.style.width = pct + '%';
                pwBar.style.background = '#ff4a6e';
                pwHint.textContent = isEn ? ((8 - len) + ' more character' + (8 - len > 1 ? 's' : '') + ' needed') : ('還需要 ' + (8 - len) + ' 個字元');
                pwHint.classList.add('hint-error');
            } else if (len < 12) {
                pwBar.style.width = '70%';
                pwBar.style.background = '#ffb800';
                pwHint.textContent = isEn ? 'Good' : '良好';
                pwHint.classList.add('hint-ok');
            } else {
                pwBar.style.width = '100%';
                pwBar.style.background = '#00ff88';
                pwHint.textContent = isEn ? 'Strong' : '很強';
                pwHint.classList.add('hint-ok');
            }
        });

        // Register form handler
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errEl = document.getElementById('errorMsg');
            const sucEl = document.getElementById('successMsg');
            const btn = document.getElementById('submitBtn');

            errEl.classList.remove('show');
            sucEl.classList.remove('show');

            // Client-side password validation
            const pw = document.getElementById('password').value;
            const isEn = localStorage.getItem('ds-lang')==='en';
            if (pw.length < 8) {
                pwInput.classList.add('input-error');
                pwHint.textContent = isEn ? 'Password must be at least 8 characters' : '密碼至少需要 8 個字元';
                pwHint.classList.add('hint-error');
                errEl.textContent = isEn ? 'Password must be at least 8 characters.' : '密碼至少需要 8 個字元。';
                errEl.classList.add('show');
                return;
            }

            // Email validation
            const email = document.getElementById('email').value;
            if (!email.includes('@') || !email.includes('.')) {
                errEl.textContent = isEn ? 'Please enter a valid email address.' : '請輸入有效的電子郵件地址。';
                errEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = isEn ? 'Creating account...' : '建立帳號中...';

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: email,
                        password: pw
                    })
                });
                const data = await res.json();
                if (data.success) {
                    sucEl.textContent = data.message || 'Account created! Redirecting...';
                    sucEl.classList.add('show');
                    setTimeout(function() {
                        window.location.href = '/dashboard';
                    }, 800);
                } else {
                    errEl.textContent = data.message || 'Registration failed.';
                    errEl.classList.add('show');
                }
            } catch (err) {
                errEl.textContent = isEn ? 'Network error. Please try again.' : '網路錯誤，請重試。';
                errEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = isEn ? 'Create Account' : '建立帳號';
            }
        });
    </script>
    <script src="/static/js/i18n.js"></script>
</body>
</html>
