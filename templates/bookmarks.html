{% extends "base.html" %}
{% block title %}書籤{% endblock %}

{% block content %}
<style>
    .bk-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 16px;
    }

    .bk-page-title {
        font-size: 24px;
        font-weight: 700;
        color: #e8eef7;
        margin-bottom: 20px;
    }

    .bk-layout {
        display: flex;
        gap: 24px;
        align-items: flex-start;
    }

    /* ===== Left Panel: Folders ===== */
    .bk-folders {
        width: 80px;
        flex-shrink: 0;
        background: #0f1629;
        border: 1px solid #1e2d4a;
        border-radius: 12px;
        padding: 16px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .bk-folder-circle {
        position: relative;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        transition: all 0.2s ease;
        border: 3px solid transparent;
    }

    .bk-folder-circle:hover {
        transform: scale(1.1);
    }

    .bk-folder-circle.selected {
        border-color: #e8eef7;
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.2);
    }

    .bk-folder-circle .bk-folder-count {
        font-family: 'Syne', sans-serif;
        font-size: 13px;
        font-weight: 700;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .bk-folder-circle.unused {
        opacity: 0.35;
        border: 2px dashed rgba(255, 255, 255, 0.3);
    }

    .bk-folder-circle.unused:hover {
        opacity: 0.7;
    }

    .bk-folder-circle.unused .bk-folder-plus {
        font-size: 20px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.7);
    }

    .bk-folder-circle .bk-folder-delete {
        position: absolute;
        top: -6px;
        right: -6px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ff4a6e;
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        line-height: 1;
        padding: 0;
    }

    .bk-folder-circle:hover .bk-folder-delete {
        display: flex;
    }

    .bk-folders-divider {
        width: 32px;
        height: 1px;
        background: #1e2d4a;
    }

    .bk-folder-all {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #1e2d4a;
        border: 3px solid transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        color: #e8eef7;
        transition: all 0.2s ease;
    }

    .bk-folder-all:hover {
        transform: scale(1.1);
    }

    .bk-folder-all.selected {
        border-color: #00d4ff;
        box-shadow: 0 0 16px rgba(0, 212, 255, 0.3);
    }

    /* ===== Right Panel: Bookmark Cards ===== */
    .bk-cards-panel {
        flex: 1;
        min-width: 0;
    }

    .bk-cards-grid {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .bk-card {
        background: #0f1629;
        border: 1px solid #1e2d4a;
        border-radius: 12px;
        padding: 18px;
        transition: border-color 0.2s ease;
        position: relative;
    }

    .bk-card:hover {
        border-color: #2a3d5e;
    }

    .bk-card-top {
        display: flex;
        align-items: flex-start;
        gap: 12px;
    }

    .bk-card-folder-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 6px;
    }

    .bk-card-body {
        flex: 1;
        min-width: 0;
    }

    .bk-card-title {
        font-size: 15px;
        font-weight: 600;
        color: #e8eef7;
        margin-bottom: 6px;
        cursor: pointer;
        transition: color 0.2s;
        text-decoration: none;
        display: block;
    }

    .bk-card-title:hover {
        color: #00d4ff;
        text-decoration: none;
    }

    .bk-card-summary {
        font-size: 13px;
        color: #4a5a7a;
        line-height: 1.5;
        margin-bottom: 10px;
    }

    .bk-card-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .bk-category-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        background: rgba(0, 212, 255, 0.12);
        color: #00d4ff;
        border: 1px solid rgba(0, 212, 255, 0.2);
    }

    .bk-note-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        background: rgba(255, 184, 0, 0.12);
        color: #ffb800;
        border: 1px solid rgba(255, 184, 0, 0.2);
    }

    .bk-card-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
        flex-shrink: 0;
    }

    .bk-btn-note {
        padding: 5px 12px;
        border-radius: 6px;
        border: 1px solid #1e2d4a;
        background: transparent;
        color: #4a5a7a;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'DM Mono', monospace;
    }

    .bk-btn-note:hover {
        border-color: #ffb800;
        color: #ffb800;
        background: rgba(255, 184, 0, 0.08);
    }

    .bk-btn-remove {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #1e2d4a;
        background: transparent;
        color: #4a5a7a;
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        line-height: 1;
    }

    .bk-btn-remove:hover {
        background: #ff4a6e;
        border-color: #ff4a6e;
        color: #fff;
    }

    .bk-note-preview {
        margin-top: 10px;
        padding: 10px 14px;
        background: rgba(255, 184, 0, 0.05);
        border: 1px solid rgba(255, 184, 0, 0.12);
        border-radius: 8px;
        font-size: 12px;
        color: #8a9abf;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
    }

    /* ===== Empty State ===== */
    .bk-empty {
        text-align: center;
        color: #4a5a7a;
        padding: 60px 20px;
        font-size: 15px;
    }

    /* ===== Note Modal ===== */
    .bk-note-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .bk-note-modal-overlay.active {
        display: flex;
    }

    .bk-note-modal {
        background: #0f1629;
        border: 1px solid #1e2d4a;
        border-radius: 16px;
        padding: 24px;
        width: 90%;
        max-width: 520px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    .bk-note-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #1e2d4a;
    }

    .bk-note-modal-header h3 {
        font-size: 16px;
        color: #e8eef7;
    }

    .bk-note-modal-close {
        background: none;
        border: none;
        color: #4a5a7a;
        font-size: 22px;
        cursor: pointer;
        padding: 4px;
        line-height: 1;
    }

    .bk-note-modal-close:hover {
        color: #e8eef7;
    }

    .bk-note-textarea {
        width: 100%;
        min-height: 160px;
        padding: 12px 14px;
        background: #0a0f1e;
        border: 1px solid #1e2d4a;
        border-radius: 8px;
        color: #e8eef7;
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        line-height: 1.6;
        resize: vertical;
    }

    .bk-note-textarea:focus {
        outline: none;
        border-color: #00d4ff;
        box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    .bk-note-modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #1e2d4a;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
        .bk-layout {
            flex-direction: column;
        }

        .bk-folders {
            width: 100%;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            padding: 12px 16px;
        }

        .bk-folders-divider {
            width: 1px;
            height: 32px;
        }

        .bk-card-actions {
            margin-left: 0;
            margin-top: 8px;
        }

        .bk-card-top {
            flex-wrap: wrap;
        }
    }
</style>

<div class="bk-container">
    <h1 class="bk-page-title" data-i18n="bm.title">我的書籤</h1>

    <div class="bk-layout">
        <!-- Left Panel: Folders -->
        <div class="bk-folders" id="bk-folders">
            <!-- Rendered by JS -->
        </div>

        <!-- Right Panel: Bookmark Cards -->
        <div class="bk-cards-panel">
            <div class="bk-cards-grid" id="bk-cards-grid">
                <!-- Rendered by JS -->
            </div>
            <div class="bk-empty" id="bk-empty" style="display:none;">
                <span data-i18n="bm.empty">尚無書籤。前往學堂新增吧！</span>
            </div>
        </div>
    </div>
</div>

<!-- Note Modal -->
<div class="bk-note-modal-overlay" id="bk-note-overlay">
    <div class="bk-note-modal">
        <div class="bk-note-modal-header">
            <h3 id="bk-note-modal-title" data-i18n="bm.write_note">撰寫筆記</h3>
            <button class="bk-note-modal-close" onclick="closeNoteModal()">&times;</button>
        </div>
        <textarea class="bk-note-textarea" id="bk-note-textarea" placeholder="在這裡寫筆記..."></textarea>
        <div class="bk-note-modal-footer">
            <button class="btn btn-secondary btn-sm" onclick="closeNoteModal()" data-i18n="bm.cancel">取消</button>
            <button class="btn btn-primary btn-sm" onclick="saveNote()" data-i18n="bm.save">儲存</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    // ===== Constants =====
    const COLORS = [
        { name: 'red',    hex: '#ff4a6e' },
        { name: 'orange', hex: '#ff8c42' },
        { name: 'yellow', hex: '#ffb800' },
        { name: 'green',  hex: '#00ff88' },
        { name: 'cyan',   hex: '#00d4ff' },
        { name: 'blue',   hex: '#4a7aff' },
        { name: 'indigo', hex: '#6366f1' },
        { name: 'purple', hex: '#a855f7' },
        { name: 'pink',   hex: '#ec4899' },
        { name: 'gray',   hex: '#6b7280' }
    ];

    // ===== State =====
    let folders = [];
    let bookmarks = [];
    let selectedFolderId = null; // null = show all
    let editingBookmarkId = null;

    // ===== Init =====
    loadFolders();

    // ===== API: Folders =====
    function loadFolders() {
        fetch('/api/bookmarks/folders')
            .then(r => r.json())
            .then(data => {
                folders = data.folders || data || [];
                renderFolders();
                loadBookmarks();
            })
            .catch(err => console.error('Load folders error:', err));
    }

    function createFolder(color) {
        fetch('/api/bookmarks/folders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ color: color })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }
            loadFolders();
        })
        .catch(err => console.error('Create folder error:', err));
    }

    function deleteFolder(folderId, e) {
        e.stopPropagation();
        if (!confirm('確定刪除此資料夾？內部所有書籤將被移除。')) return;

        fetch('/api/bookmarks/folders/' + folderId, {
            method: 'DELETE'
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }
            if (selectedFolderId === folderId) {
                selectedFolderId = null;
            }
            loadFolders();
        })
        .catch(err => console.error('Delete folder error:', err));
    }

    // ===== API: Bookmarks =====
    function loadBookmarks() {
        let url = '/api/bookmarks';
        if (selectedFolderId) {
            url += '?folder_id=' + encodeURIComponent(selectedFolderId);
        }

        fetch(url)
            .then(r => r.json())
            .then(data => {
                bookmarks = data.bookmarks || data || [];
                renderBookmarks();
            })
            .catch(err => console.error('Load bookmarks error:', err));
    }

    function removeBookmark(bookmarkId) {
        if (!confirm('確定移除此書籤？')) return;

        fetch('/api/bookmarks/' + bookmarkId, {
            method: 'DELETE'
        })
        .then(r => r.json())
        .then(() => {
            loadFolders();
        })
        .catch(err => console.error('Remove bookmark error:', err));
    }

    function saveNote() {
        if (!editingBookmarkId) return;

        const note = document.getElementById('bk-note-textarea').value;

        fetch('/api/bookmarks/' + editingBookmarkId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note: note })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }
            closeNoteModal();
            loadBookmarks();
        })
        .catch(err => console.error('Save note error:', err));
    }

    // ===== Render: Folders =====
    function renderFolders() {
        const container = document.getElementById('bk-folders');
        const usedColors = {};
        folders.forEach(f => {
            usedColors[f.color] = f;
        });

        let html = '';

        // "All" button
        html += '<div class="bk-folder-all' + (selectedFolderId === null ? ' selected' : '') + '" onclick="selectFolder(null)" title="全部書籤" data-i18n="bm.all">全部</div>';
        html += '<div class="bk-folders-divider"></div>';

        // Render each color
        COLORS.forEach(c => {
            const folder = usedColors[c.name] || usedColors[c.hex];
            if (folder) {
                // Existing folder
                const isSelected = selectedFolderId === folder.id;
                const count = folder.bookmark_count != null ? folder.bookmark_count : 0;
                html += '<div class="bk-folder-circle' + (isSelected ? ' selected' : '') + '" '
                    + 'style="background:' + c.hex + ';" '
                    + 'onclick="selectFolder(' + folder.id + ')" '
                    + 'title="' + count + ' 個書籤">'
                    + '<span class="bk-folder-count">' + count + '</span>'
                    + '<button class="bk-folder-delete" onclick="deleteFolderBtn(' + folder.id + ',event)">&times;</button>'
                    + '</div>';
            } else {
                // Unused color
                html += '<div class="bk-folder-circle unused" '
                    + 'style="background:' + c.hex + ';" '
                    + 'onclick="createFolderBtn(\'' + c.name + '\')" '
                    + 'title="新增資料夾">'
                    + '<span class="bk-folder-plus">+</span>'
                    + '</div>';
            }
        });

        container.innerHTML = html;
    }

    // ===== Render: Bookmarks =====
    function renderBookmarks() {
        const grid = document.getElementById('bk-cards-grid');
        const empty = document.getElementById('bk-empty');

        if (!bookmarks.length) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        grid.innerHTML = bookmarks.map(bk => {
            const folderColor = getFolderColor(bk.folder_id);
            const hasNote = bk.note && bk.note.trim().length > 0;
            const notePreview = hasNote ? escapeHtml(bk.note.substring(0, 240)) : '';
            const noteBtnLabel = hasNote ? '\uD83D\uDCAD 編輯筆記' : '\uD83D\uDCAD 撰寫筆記';

            let html = '<div class="bk-card">';
            html += '<div class="bk-card-top">';

            // Folder color dot
            if (folderColor) {
                html += '<div class="bk-card-folder-dot" style="background:' + folderColor + ';"></div>';
            }

            // Body
            html += '<div class="bk-card-body">';
            html += '<a class="bk-card-title" href="/academy/' + bk.article_id + '">' + escapeHtml(bk.title || bk.article_title || '無標題') + '</a>';

            if (bk.summary || bk.article_summary) {
                html += '<div class="bk-card-summary">' + escapeHtml(bk.summary || bk.article_summary) + '</div>';
            }

            html += '<div class="bk-card-meta">';
            if (bk.category || bk.article_category) {
                html += '<span class="bk-category-badge">' + escapeHtml(bk.category || bk.article_category) + '</span>';
            }
            if (hasNote) {
                html += '<span class="bk-note-badge" data-i18n="bm.has_note">\uD83D\uDCAD 已有筆記</span>';
            }
            html += '</div>'; // .bk-card-meta
            html += '</div>'; // .bk-card-body

            // Actions
            html += '<div class="bk-card-actions">';
            html += '<button class="bk-btn-note" onclick="openNoteModal(' + bk.id + ', ' + escapeAttr(JSON.stringify(bk.note || '')) + ')">' + noteBtnLabel + '</button>';
            html += '<button class="bk-btn-remove" onclick="removeBookmarkBtn(' + bk.id + ')" title="移除">&times;</button>';
            html += '</div>'; // .bk-card-actions

            html += '</div>'; // .bk-card-top

            // Note preview
            if (hasNote) {
                html += '<div class="bk-note-preview">' + notePreview + (bk.note.length > 240 ? '...' : '') + '</div>';
            }

            html += '</div>'; // .bk-card
            return html;
        }).join('');
    }

    // ===== Helpers =====
    function getFolderColor(folderId) {
        if (!folderId) return null;
        const folder = folders.find(f => f.id === folderId);
        if (!folder) return null;
        const colorObj = COLORS.find(c => c.name === folder.color || c.hex === folder.color);
        return colorObj ? colorObj.hex : folder.color;
    }

    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function escapeAttr(str) {
        return "'" + str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '') + "'";
    }

    // ===== Modal =====
    window.openNoteModal = function(bookmarkId, note) {
        editingBookmarkId = bookmarkId;
        document.getElementById('bk-note-textarea').value = note || '';
        document.getElementById('bk-note-modal-title').textContent = note ? '編輯筆記' : '撰寫筆記';
        document.getElementById('bk-note-overlay').classList.add('active');
        document.getElementById('bk-note-textarea').focus();
    };

    window.closeNoteModal = function() {
        editingBookmarkId = null;
        document.getElementById('bk-note-overlay').classList.remove('active');
        document.getElementById('bk-note-textarea').value = '';
    };

    window.saveNote = saveNote;

    // Close modal on overlay click
    document.getElementById('bk-note-overlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeNoteModal();
        }
    });

    // ===== Folder interactions =====
    window.selectFolder = function(folderId) {
        selectedFolderId = folderId;
        renderFolders();
        loadBookmarks();
    };

    window.createFolderBtn = function(colorName) {
        createFolder(colorName);
    };

    window.deleteFolderBtn = function(folderId, e) {
        deleteFolder(folderId, e);
    };

    window.removeBookmarkBtn = function(bookmarkId) {
        removeBookmark(bookmarkId);
    };

})();
</script>
{% endblock %}
